<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Sokoban with Emscripten</title>
    <style>
        body {
            font-family: monospace;
        }

        #source {
            margin-bottom: 0.5rem;
            color: #555;
        }

        #status {
            min-height: 1.25rem;
            margin-top: 0.5rem;
        }

        #status.error {
            color: #b00020;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(var(--cols), 20px);
            line-height: initial;
        }

        .tile {
            display: block;
            width: 20px;
            height: 20px;
            font-size: 16px;
            text-align: center;
            vertical-align: top;
            box-sizing: border-box;
            background-color: #f0f0f0;
        }

        .tile.wall {
            background-color: #444;
            color: #fff;
        }

        .tile.player {
            background-color: #f0f0f0;
            color: #00f;
        }

        .tile.box {
            background-color: #f0f0f0;
            color: #d70;
        }

        .tile.goal {
            background-color: #ffc;
            border: 1px solid #d70;
        }

        .tile.player-on-goal {
            background-color: #ffc;
            color: #00f;
        }

        .tile.box-on-goal {
            background-color: #ffc;
            color: #d70;
        }

        .tile.ice {
            background-color: #cff;
            color: #eee;
        }

        .tile.player-on-ice {
            background-color: #cff;
            color: #00f;
        }

        .tile.box-on-ice {
            background-color: #cff;
            color: #d70;
        }
    </style>
</head>
<body>
    <div id="source"></div>
    <div id="game-board"></div>
    <div id="status">Loading runtime...</div>
    <script src="sokoban.js"></script>
    <script>
        const defaultLevelData = `
################
#@     ~~~~~"~
#$* #   ~"~
#.  #    ~
#####
`.trim();

        const eventTickTime = 100;
        const levelAdvanceDelayMs = 2000;

        const boardElement = document.getElementById('game-board');
        const sourceElement = document.getElementById('source');
        const statusElement = document.getElementById('status');

        let c_sokoban_init_level;
        let c_sokoban_count_levels;
        let c_sokoban_handle_input;
        let c_sokoban_is_event_ongoing;
        let c_sokoban_process_event;
        let c_sokoban_get_rows;
        let c_sokoban_get_cols;
        let c_sokoban_get_tile;
        let c_sokoban_is_game_won;

        let packText = defaultLevelData;
        let packLabel = 'Embedded level';
        let packUrl = '';
        let currentLevelIndex = 0;
        let totalLevels = 1;
        let gameReady = false;
        let loadingLevel = false;
        let pendingAdvanceTimer = null;

        function setStatus(message, isError = false) {
            statusElement.textContent = message;
            statusElement.classList.toggle('error', isError);
        }

        function refreshSourceLabel() {
            const levelLabel = totalLevels > 1 ? `Level ${currentLevelIndex + 1} / ${totalLevels}` : 'Single level';
            sourceElement.textContent = `${packLabel} - ${levelLabel}`;
            sourceElement.title = packUrl;
        }

        function refreshStatus() {
            if (!gameReady) {
                return;
            }
            if (loadingLevel) {
                setStatus(`Loading level ${currentLevelIndex + 1}...`);
                return;
            }
            if (c_sokoban_is_game_won()) {
                if (currentLevelIndex + 1 < totalLevels) {
                    setStatus(`Level ${currentLevelIndex + 1} complete! Loading level ${currentLevelIndex + 2}...`);
                } else {
                    setStatus(`Congratulations! You completed all ${totalLevels} levels.`);
                }
                return;
            }
            if (totalLevels > 1) {
                setStatus(`Level ${currentLevelIndex + 1} of ${totalLevels}`);
            } else {
                setStatus('');
            }
        }

        function clearPendingAdvance() {
            if (pendingAdvanceTimer !== null) {
                clearTimeout(pendingAdvanceTimer);
                pendingAdvanceTimer = null;
            }
        }

        function drawBoard() {
            const rows = c_sokoban_get_rows();
            const cols = c_sokoban_get_cols();
            const fragment = document.createDocumentFragment();

            boardElement.innerHTML = '';
            boardElement.style.setProperty('--cols', cols);

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const tileChar = String.fromCharCode(c_sokoban_get_tile(row, col));
                    const tileDiv = document.createElement('div');
                    tileDiv.classList.add('tile');
                    tileDiv.textContent = tileChar;

                    switch (tileChar) {
                        case '#':
                            tileDiv.classList.add('wall');
                            break;
                        case '@':
                            tileDiv.classList.add('player');
                            break;
                        case '+':
                            tileDiv.classList.add('player-on-goal');
                            break;
                        case '&':
                            tileDiv.classList.add('player-on-ice');
                            break;
                        case '$':
                            tileDiv.classList.add('box');
                            break;
                        case '*':
                            tileDiv.classList.add('box-on-goal');
                            break;
                        case '"':
                            tileDiv.classList.add('box-on-ice');
                            break;
                        case '.':
                            tileDiv.classList.add('goal');
                            break;
                        case '~':
                            tileDiv.classList.add('ice');
                            break;
                        default:
                            tileDiv.classList.add('floor');
                            break;
                    }

                    fragment.appendChild(tileDiv);
                }
            }

            boardElement.appendChild(fragment);
            refreshSourceLabel();
            refreshStatus();
        }

        function loadLevel(levelIndex) {
            clearPendingAdvance();
            loadingLevel = true;
            currentLevelIndex = levelIndex;
            refreshSourceLabel();
            refreshStatus();

            if (!c_sokoban_init_level(packText, levelIndex)) {
                loadingLevel = false;
                gameReady = false;
                setStatus(`Could not load level ${levelIndex + 1}.`, true);
                return false;
            }

            loadingLevel = false;
            gameReady = true;
            drawBoard();
            return true;
        }

        function maybeAdvanceLevel() {
            if (!gameReady || !c_sokoban_is_game_won()) {
                refreshStatus();
                return;
            }
            if (currentLevelIndex + 1 >= totalLevels || pendingAdvanceTimer !== null) {
                refreshStatus();
                return;
            }

            refreshStatus();
            pendingAdvanceTimer = window.setTimeout(() => {
                pendingAdvanceTimer = null;
                loadLevel(currentLevelIndex + 1);
            }, levelAdvanceDelayMs);
        }

        function handleEventProgression() {
            if (c_sokoban_process_event()) {
                drawBoard();
            }
            if (c_sokoban_is_event_ongoing()) {
                window.setTimeout(handleEventProgression, eventTickTime);
                return;
            }
            maybeAdvanceLevel();
        }

        async function loadRequestedPack() {
            const levelParam = new URLSearchParams(window.location.search).get('l');

            if (levelParam === null) {
                return {
                    text: defaultLevelData,
                    label: 'Embedded level',
                    url: ''
                };
            }
            if (levelParam.trim() === '') {
                throw new Error("The 'l' query parameter is empty.");
            }

            const resolvedUrl = new URL(levelParam, window.location.href);
            const response = await fetch(resolvedUrl);

            if (!response.ok) {
                throw new Error(`Could not load ${resolvedUrl.href} (HTTP ${response.status}).`);
            }

            return {
                text: await response.text(),
                label: resolvedUrl.pathname.split('/').pop() || resolvedUrl.href,
                url: resolvedUrl.href
            };
        }

        async function initGame() {
            try {
                setStatus('Loading levels...');
                const loadedPack = await loadRequestedPack();
                const detectedLevels = c_sokoban_count_levels(loadedPack.text);

                if (detectedLevels <= 0) {
                    throw new Error('No valid Sokoban levels were found.');
                }

                packText = loadedPack.text;
                packLabel = loadedPack.label;
                packUrl = loadedPack.url;
                totalLevels = detectedLevels;
                currentLevelIndex = 0;

                if (!loadLevel(0)) {
                    throw new Error('The first level could not be loaded.');
                }
            } catch (error) {
                boardElement.innerHTML = '';
                sourceElement.textContent = '';
                gameReady = false;
                setStatus(error.message, true);
                console.error(error);
            }
        }

        function handleKeyPress(event) {
            let inputChar = '';

            if (!gameReady || loadingLevel || pendingAdvanceTimer !== null || c_sokoban_is_event_ongoing()) {
                return;
            }

            switch (event.key) {
                case 'ArrowUp':
                case 'w':
                    inputChar = 'w';
                    break;
                case 'ArrowDown':
                case 's':
                    inputChar = 's';
                    break;
                case 'ArrowLeft':
                case 'a':
                    inputChar = 'a';
                    break;
                case 'ArrowRight':
                case 'd':
                    inputChar = 'd';
                    break;
                case 'u':
                    inputChar = 'u';
                    break;
                case 'r':
                    inputChar = 'r';
                    break;
                default:
                    return;
            }

            if (c_sokoban_handle_input(inputChar.charCodeAt(0))) {
                drawBoard();
            }
            if (c_sokoban_is_event_ongoing()) {
                window.setTimeout(handleEventProgression, eventTickTime);
            } else {
                maybeAdvanceLevel();
            }
        }

        Module.onRuntimeInitialized = async () => {
            c_sokoban_init_level = Module.cwrap('sokoban_init_web_level', 'boolean', ['string', 'number']);
            c_sokoban_count_levels = Module.cwrap('sokoban_count_levels_web', 'number', ['string']);
            c_sokoban_handle_input = Module.cwrap('sokoban_handle_input', 'boolean', ['number']);
            c_sokoban_is_event_ongoing = Module.cwrap('sokoban_is_event_ongoing', 'boolean', []);
            c_sokoban_process_event = Module.cwrap('sokoban_process_event', 'boolean', []);
            c_sokoban_get_rows = Module.cwrap('sokoban_get_rows', 'number', []);
            c_sokoban_get_cols = Module.cwrap('sokoban_get_cols', 'number', []);
            c_sokoban_get_tile = Module.cwrap('sokoban_get_tile', 'number', ['number', 'number']);
            c_sokoban_is_game_won = Module.cwrap('sokoban_is_game_won', 'boolean', []);

            window.addEventListener('keydown', handleKeyPress);
            await initGame();
        };
    </script>
</body>
</html>
